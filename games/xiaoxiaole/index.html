<script>
(function() {
  // ========== Themes (randomly selected each game) ==========
  const themes = {
    'fruits': ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍌','🍉','🥭','🍍'],
    'land-animals': ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮'],
    'water-animals': ['🐟','🐠','🐡','🦐','🦀','🐙','🦑','🐳','🐬','🦈','🐚','🪼'],
    'plants': ['🌵','🌴','🌲','🌳','🌿','☘️','🍀','🌱','🎋','🎍','🌾','🍃'],
    'flowers': ['🌸','🌺','🌻','🌷','🌹','🌼','💐','🏵️','💮','🪻'],
    'food': ['🍕','🍔','🍟','🌭','🍿','🍩','🍪','🍰','🧁','🍫','🍭','🍬'],
    'vehicles': ['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🛻','🚚'],
    'sports': ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓','🏸','🥊','⛳']
  };
  const themeKeys = Object.keys(themes);

  // ========== Elements ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const leftCountEl = document.getElementById('leftCount');
  const timeEl = document.getElementById('time');
  const startOverlay = document.getElementById('startOverlay');
  const winOverlay = document.getElementById('winOverlay');
  const loseOverlay = document.getElementById('loseOverlay');
  const winScoreEl = document.getElementById('winScore');
  const loseScoreEl = document.getElementById('loseScore');
  const winTimeEl = document.getElementById('winTime');
  const loseLeftEl = document.getElementById('loseLeft');
  const startBtn = document.getElementById('startBtn');
  const winRestartBtn = document.getElementById('winRestartBtn');
  const loseRestartBtn = document.getElementById('loseRestartBtn');
  const hintBtn = document.getElementById('hintBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const diffBtns = document.querySelectorAll('.diff-btn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const fsHintBtn = document.getElementById('fsHintBtn');
  const fsShuffleBtn = document.getElementById('fsShuffleBtn');
  const fsPauseBtn = document.getElementById('fsPauseBtn');
  const infoBar = document.querySelector('.info-bar');
  let isFullscreen = false;

  // ========== Config ==========
  let gridSize = 8; // 8x8
  let tileSize = 50;
  let padding = 2;
  let board = []; // 2D array, 0 = empty, else type index
  let selected = null; // {x, y}
  let score = 0;
  let leftCount = 0;
  let gameRunning = false;
  let paused = false;
  let timeSeconds = 0;
  let timerInterval = null;
  let hintPair = null;
  let hintTimer = null;
  let linePath = null;
  let lineTimer = null;

  // ========== Canvas Setup ==========
  function resizeCanvas() {
    if (isFullscreen) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const isLandscape = w > h;
      // Portrait: info bar on top + controls on bottom
      // Landscape: info bar on left + controls on right
      const availW = isLandscape ? w - 180 : w - 20;
      const availH = isLandscape ? h - 40 : h - 180;
      const maxTile = Math.floor(Math.min(availW / (gridSize + 2), availH / (gridSize + 2)));
      tileSize = Math.max(20, Math.min(maxTile, 80));
      const cw = (gridSize + 2) * tileSize;
      const ch = (gridSize + 2) * tileSize;
      canvas.width = cw;
      canvas.height = ch;
    } else {
      const maxWidth = Math.min(600, window.innerWidth - 30);
      tileSize = Math.floor(maxWidth / (gridSize + 2));
      tileSize = Math.max(30, Math.min(tileSize, 60));
      const w = (gridSize + 2) * tileSize;
      const h = (gridSize + 2) * tileSize;
      canvas.width = w;
      canvas.height = h;
    }
  }

  window.addEventListener('resize', function() {
    resizeCanvas();
    draw();
  });

  // ========== Board Init ==========
  function initBoard() {
    const totalTiles = gridSize * gridSize;
    const pairCount = totalTiles / 2;
    // Randomly pick a theme for this game
    const randomThemeKey = themeKeys[Math.floor(Math.random() * themeKeys.length)];
    const themeEmojis = themes[randomThemeKey];
    const typesInUse = Math.min(themeEmojis.length, Math.max(6, Math.floor(pairCount / 4)));

    // Create pairs
    let tiles = [];
    for (let i = 0; i < pairCount; i++) {
      const type = i % typesInUse;
      tiles.push(type, type);
    }

    // Shuffle
    for (let i = tiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }

    // Fill board (with border of empty around actual grid)
    // board is (gridSize+2) x (gridSize+2), index 0 and gridSize+1 are borders
    board = [];
    for (let y = 0; y < gridSize + 2; y++) {
      board[y] = [];
      for (let x = 0; x < gridSize + 2; x++) {
        if (x === 0 || x === gridSize + 1 || y === 0 || y === gridSize + 1) {
          board[y][x] = -1; // border (empty, passable)
        } else {
          board[y][x] = tiles[(y - 1) * gridSize + (x - 1)];
        }
      }
    }

    leftCount = totalTiles;
    leftCountEl.textContent = leftCount;
    currentEmojis = themeEmojis;
  }

  let currentEmojis = [];

  // ========== Path Finding (max 2 turns) ==========
  function canConnect(x1, y1, x2, y2) {
    if (x1 === x2 && y1 === y2) return null;
    if (board[y1][x1] !== board[y2][x2]) return null;
    if (board[y1][x1] < 0) return null;

    // Try direct horizontal
    if (y1 === y2 && canWalkHorizontal(x1, x2, y1, true)) {
      return [{x: x1, y: y1}, {x: x2, y: y2}];
    }
    // Try direct vertical
    if (x1 === x2 && canWalkVertical(y1, y2, x1, true)) {
      return [{x: x1, y: y1}, {x: x2, y: y2}];
    }

    // Try 1 turn: two L shapes
    // Corner at (x2, y1)
    if (board[y1][x2] < 0 &&
        canWalkHorizontal(x1, x2, y1, true) &&
        canWalkVertical(y1, y2, x2, false)) {
      return [{x: x1, y: y1}, {x: x2, y: y1}, {x: x2, y: y2}];
    }
    // Corner at (x1, y2)
    if (board[y2][x1] < 0 &&
        canWalkVertical(y1, y2, x1, true) &&
        canWalkHorizontal(x1, x2, y2, false)) {
      return [{x: x1, y: y1}, {x: x1, y: y2}, {x: x2, y: y2}];
    }

    // Try 2 turns: scan all possible intermediate rows/cols
    // Horizontal scan: go up/down from (x1,y1) to row y, then horizontal to x2, then down/up
    for (let y = 0; y < gridSize + 2; y++) {
      if (y === y1 || y === y2) continue;
      if (board[y][x1] >= 0 || board[y][x2] >= 0) continue;
      if (canWalkVertical(y1, y, x1, true) &&
          canWalkHorizontal(x1, x2, y, false) &&
          canWalkVertical(y, y2, x2, false)) {
        return [{x: x1, y: y1}, {x: x1, y: y}, {x: x2, y: y}, {x: x2, y: y2}];
      }
    }

    // Vertical scan: go left/right from (x1,y1) to col x, then vertical to y2, then right/left
    for (let x = 0; x < gridSize + 2; x++) {
      if (x === x1 || x === x2) continue;
      if (board[y1][x] >= 0 || board[y2][x] >= 0) continue;
      if (canWalkHorizontal(x1, x, y1, true) &&
          canWalkVertical(y1, y2, x, false) &&
          canWalkHorizontal(x, x2, y2, false)) {
        return [{x: x1, y: y1}, {x: x, y: y1}, {x: x, y: y2}, {x: x2, y: y2}];
      }
    }

    return null;
  }

  function canWalkHorizontal(x1, x2, y, includeEnds) {
    const minX = Math.min(x1, x2);
    const maxX = Math.max(x1, x2);
    for (let x = minX; x <= maxX; x++) {
      if (!includeEnds && (x === x1 || x === x2)) continue;
      if (x === x1 || x === x2) continue; // endpoints are tiles, skip
      if (board[y][x] >= 0) return false;
    }
    return true;
  }

  function canWalkVertical(y1, y2, x, includeEnds) {
    const minY = Math.min(y1, y2);
    const maxY = Math.max(y1, y2);
    for (let y = minY; y <= maxY; y++) {
      if (!includeEnds && (y === y1 || y === y2)) continue;
      if (y === y1 || y === y2) continue;
      if (board[y][x] >= 0) return false;
    }
    return true;
  }

  // ========== Find a valid pair (for hint / deadlock check) ==========
  function findValidPair() {
    const positions = [];
    for (let y = 1; y <= gridSize; y++) {
      for (let x = 1; x <= gridSize; x++) {
        if (board[y][x] >= 0) {
          positions.push({x, y, type: board[y][x]});
        }
      }
    }

    for (let i = 0; i < positions.length; i++) {
      for (let j = i + 1; j < positions.length; j++) {
        if (positions[i].type === positions[j].type) {
          const path = canConnect(positions[i].x, positions[i].y, positions[j].x, positions[j].y);
          if (path) {
            return {a: positions[i], b: positions[j], path: path};
          }
        }
      }
    }
    return null;
  }

  // ========== Drawing ==========
  function draw() {
    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Background grid pattern (subtle)
    ctx.fillStyle = 'rgba(148, 163, 184, 0.06)';
    for (let y = 1; y <= gridSize; y++) {
      for (let x = 1; x <= gridSize; x++) {
        if ((x + y) % 2 === 0) {
          ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
        }
      }
    }

    // Tiles
    for (let y = 1; y <= gridSize; y++) {
      for (let x = 1; x <= gridSize; x++) {
        const type = board[y][x];
        if (type >= 0) {
          drawTile(x, y, currentEmojis[type], false, null, type);
        }
      }
    }

    // Selected tile
    if (selected) {
      const type = board[selected.y][selected.x];
      if (type >= 0) {
        drawTile(selected.x, selected.y, currentEmojis[type], true, null, type);
      }
    }

    // Hint highlight
    if (hintPair) {
      ctx.save();
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(Date.now() / 150);
      drawTile(hintPair.a.x, hintPair.a.y, currentEmojis[hintPair.a.type], true, '#f59e0b', hintPair.a.type);
      drawTile(hintPair.b.x, hintPair.b.y, currentEmojis[hintPair.b.type], true, '#f59e0b', hintPair.b.type);
      ctx.restore();
    }

    // Connection line
    if (linePath) {
      drawLinePath(linePath);
    }

    // Pause overlay
    if (paused) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0ea5e9';
      ctx.font = `bold ${tileSize * 0.8}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⏸ 已暂停', canvas.width / 2, canvas.height / 2);
    }
  }

  // Macaron color palette for tiles (12 colors)
  const tileColors = [
    { bg: '#fef2f2', border: '#fecaca' }, // 淡红
    { bg: '#fff7ed', border: '#fed7aa' }, // 淡橙
    { bg: '#fefce8', border: '#fef08a' }, // 淡黄
    { bg: '#f0fdf4', border: '#bbf7d0' }, // 淡绿
    { bg: '#ecfeff', border: '#a5f3fc' }, // 淡青
    { bg: '#eff6ff', border: '#bfdbfe' }, // 淡蓝
    { bg: '#f5f3ff', border: '#ddd6fe' }, // 淡紫
    { bg: '#fdf2f8', border: '#f9a8d4' }, // 淡粉
    { bg: '#faf5ff', border: '#e9d5ff' }, // 淡紫罗兰
    { bg: '#ecfeff', border: '#67e8f9' }, // 淡 cyan
    { bg: '#fef9c3', border: '#fde68a' }, // 淡琥珀
    { bg: '#dcfce7', border: '#86efac' }, // 淡薄荷绿
  ];

  function getTileColor(type) {
    return tileColors[type % tileColors.length];
  }

  function drawTile(gx, gy, emoji, selected, borderColor, type) {
    const x = gx * tileSize + padding;
    const y = gy * tileSize + padding;
    const s = tileSize - padding * 2;
    const radius = s * 0.25;
    const colorSet = getTileColor(type);

    // Shadow
    ctx.fillStyle = 'rgba(15, 23, 42, 0.06)';
    ctx.beginPath();
    roundRect(ctx, x + 1, y + 2, s, s, radius);
    ctx.fill();

    // Selected glow effect
    if (selected) {
      ctx.save();
      ctx.shadowColor = borderColor || '#0ea5e9';
      ctx.shadowBlur = s * 0.2;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      roundRect(ctx, x - 2, y - 2, s + 4, s + 4, radius + 2);
      ctx.fill();
      ctx.restore();
    }

    // Tile background - macaron color by type
    let bgColor = colorSet.bg;
    let borderCol = colorSet.border;

    if (selected) {
      bgColor = '#e0f2fe';
      borderCol = '#0ea5e9';
    }
    if (borderColor) {
      bgColor = '#fef3c7';
      borderCol = borderColor;
    }

    ctx.fillStyle = bgColor;
    ctx.beginPath();
    roundRect(ctx, x, y, s, s, radius);
    ctx.fill();

    // Border
    ctx.strokeStyle = borderCol;
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.beginPath();
    roundRect(ctx, x, y, s, s, radius);
    ctx.stroke();

    // Emoji
    ctx.font = `${s * 0.62}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, x + s / 2, y + s / 2 + 1);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawLinePath(path) {
    ctx.save();
    ctx.strokeStyle = '#0ea5e9';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(14, 165, 233, 0.5)';
    ctx.shadowBlur = 8;

    ctx.beginPath();
    const cx = tileSize / 2;
    const cy = tileSize / 2;
    ctx.moveTo(path[0].x * tileSize + cx, path[0].y * tileSize + cy);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(path[i].x * tileSize + cx, path[i].y * tileSize + cy);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Animation loop for hint glow
  function animLoop() {
    if (hintPair || linePath) {
      draw();
      requestAnimationFrame(animLoop);
    }
  }

  // ========== Game Logic ==========
  function handleClick(gx, gy) {
    if (!gameRunning || paused) return;
    if (gx < 1 || gx > gridSize || gy < 1 || gy > gridSize) return;
    if (board[gy][gx] < 0) return;

    // Clear hint
    hintPair = null;
    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }

    if (!selected) {
      selected = {x: gx, y: gy};
      draw();
      return;
    }

    if (selected.x === gx && selected.y === gy) {
      selected = null;
      draw();
      return;
    }

    // Try to connect
    const path = canConnect(selected.x, selected.y, gx, gy);
    if (path) {
      // Show line briefly
      linePath = path;
      draw();
      animLoop();

      const prevSelected = { ...selected };
      const target = { x: gx, y: gy };

      setTimeout(function() {
        // Remove tiles
        board[prevSelected.y][prevSelected.x] = -1;
        board[target.y][target.x] = -1;
        leftCount -= 2;
        leftCountEl.textContent = leftCount;
        score += 10 + Math.max(0, 50 - timeSeconds) * 2;
        scoreEl.textContent = score;

        linePath = null;
        selected = null;
        draw();

        // Check win
        if (leftCount <= 0) {
          gameWin();
          return;
        }

        // Check if no moves available
        if (!findValidPair()) {
          // Auto shuffle
          shuffleBoard();
        }
      }, 250);
    } else {
      // Not connectable - select new tile
      selected = {x: gx, y: gy};
      draw();
    }
  }

  function shuffleBoard() {
    // Collect remaining tiles
    const remaining = [];
    const positions = [];
    for (let y = 1; y <= gridSize; y++) {
      for (let x = 1; x <= gridSize; x++) {
        if (board[y][x] >= 0) {
          remaining.push(board[y][x]);
          positions.push({x, y});
        }
      }
    }

    // Shuffle
    for (let i = remaining.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }

    // Place back
    for (let i = 0; i < positions.length; i++) {
      board[positions[i].y][positions[i].x] = remaining[i];
    }

    // If still no valid pair, try again (up to 10 times)
    let tries = 0;
    while (!findValidPair() && tries < 10) {
      for (let i = remaining.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
      }
      for (let i = 0; i < positions.length; i++) {
        board[positions[i].y][positions[i].x] = remaining[i];
      }
      tries++;
    }

    draw();
  }

  function showHint() {
    if (!gameRunning || paused) return;
    const pair = findValidPair();
    if (pair) {
      hintPair = pair;
      score = Math.max(0, score - 20);
      scoreEl.textContent = score;
      draw();
      animLoop();
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(function() {
        hintPair = null;
        hintTimer = null;
        draw();
      }, 2000);
    }
  }

  function togglePause() {
    if (!gameRunning) return;
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ 继续' : '⏸ 暂停';
    updateFsPauseBtn();
    if (paused) {
      stopTimer();
    } else {
      startTimer();
    }
    draw();
  }

  // ========== Timer ==========
  function startTimer() {
    stopTimer();
    timerInterval = setInterval(function() {
      timeSeconds++;
      updateTimeDisplay();
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function updateTimeDisplay() {
    const mins = Math.floor(timeSeconds / 60);
    const secs = timeSeconds % 60;
    timeEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }

  // ========== Game State ==========
  function startGame() {
    resizeCanvas();
    initBoard();
    score = 0;
    scoreEl.textContent = score;
    timeSeconds = 0;
    updateTimeDisplay();
    selected = null;
    hintPair = null;
    linePath = null;
    paused = false;
    pauseBtn.textContent = '⏸ 暂停';
    updateFsPauseBtn();
    gameRunning = true;
    startOverlay.classList.add('hidden');
    winOverlay.classList.add('hidden');
    loseOverlay.classList.add('hidden');
    startTimer();
    // Info bar translucent during play in fullscreen
    if (isFullscreen) {
      infoBar.classList.remove('visible');
    }
    draw();
  }

  function gameWin() {
    gameRunning = false;
    stopTimer();
    winScoreEl.textContent = score;
    winTimeEl.textContent = `用时 ${timeEl.textContent}`;
    winOverlay.classList.remove('hidden');
    if (isFullscreen) {
      infoBar.classList.add('visible');
    }
  }

  function gameLose() {
    gameRunning = false;
    stopTimer();
    loseScoreEl.textContent = score;
    loseLeftEl.textContent = `还剩 ${leftCount} 个方块`;
    loseOverlay.classList.remove('hidden');
    if (isFullscreen) {
      infoBar.classList.add('visible');
    }
  }

  // ========== Input Handling ==========
  function getGridPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top) * scaleY;
    const gx = Math.floor(x / tileSize);
    const gy = Math.floor(y / tileSize);
    return { gx, gy };
  }

  canvas.addEventListener('click', function(e) {
    const pos = getGridPos(e.clientX, e.clientY);
    handleClick(pos.gx, pos.gy);
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const pos = getGridPos(touch.clientX, touch.clientY);
    handleClick(pos.gx, pos.gy);
  }, { passive: false });

  // ========== Buttons ==========
  startBtn.addEventListener('click', startGame);
  winRestartBtn.addEventListener('click', startGame);
  loseRestartBtn.addEventListener('click', startGame);
  hintBtn.addEventListener('click', showHint);
  shuffleBtn.addEventListener('click', function() {
    if (!gameRunning || paused) return;
    score = Math.max(0, score - 30);
    scoreEl.textContent = score;
    shuffleBoard();
  });
  pauseBtn.addEventListener('click', togglePause);

  // ========== Fullscreen ==========
  function toggleFullscreen() {
    isFullscreen = !isFullscreen;

    if (isFullscreen) {
      document.body.classList.add('fullscreen-mode');
      fullscreenBtn.innerHTML = '✕';
      fullscreenBtn.title = '退出全屏';
      // Show info bar translucent
      if (!winOverlay.classList.contains('hidden') || !loseOverlay.classList.contains('hidden')) {
        infoBar.classList.add('visible');
      } else {
        infoBar.classList.remove('visible');
      }
    } else {
      document.body.classList.remove('fullscreen-mode');
      fullscreenBtn.innerHTML = '⛶';
      fullscreenBtn.title = '全屏';
      infoBar.classList.remove('visible');
    }

    setTimeout(function() {
      resizeCanvas();
      draw();
    }, 50);
  }

  fullscreenBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleFullscreen();
  });

  // Fullscreen floating control buttons
  fsHintBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    showHint();
  });
  fsHintBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    showHint();
  }, { passive: false });

  fsShuffleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (!gameRunning || paused) return;
    score = Math.max(0, score - 30);
    scoreEl.textContent = score;
    shuffleBoard();
  });
  fsShuffleBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!gameRunning || paused) return;
    score = Math.max(0, score - 30);
    scoreEl.textContent = score;
    shuffleBoard();
  }, { passive: false });

  function updateFsPauseBtn() {
    fsPauseBtn.innerHTML = paused ? '▶' : '⏸';
  }

  fsPauseBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    togglePause();
    updateFsPauseBtn();
  });
  fsPauseBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    togglePause();
    updateFsPauseBtn();
  }, { passive: false });

  // Prevent scroll in fullscreen
  document.addEventListener('touchmove', function(e) {
    if (isFullscreen) e.preventDefault();
  }, { passive: false });

  // Difficulty buttons
  diffBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      diffBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      gridSize = parseInt(this.getAttribute('data-size'));
      if (gameRunning) {
        startGame(); // restart with new size
      } else {
        resizeCanvas();
      }
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.key === 'h' || e.key === 'H') {
      showHint();
    } else if (e.key === 's' || e.key === 'S') {
      if (gameRunning && !paused) {
        score = Math.max(0, score - 30);
        scoreEl.textContent = score;
        shuffleBoard();
      }
    } else if (e.key === ' ') {
      e.preventDefault();
      togglePause();
    }
  });

  // Initial setup
  resizeCanvas();
  initBoard();
  draw();

})();
</script>

</body>
</html>
