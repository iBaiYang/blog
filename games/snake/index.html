<script>
(function() {
  // Elements
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestScoreEl = document.getElementById('bestScore');
  const finalScoreEl = document.getElementById('finalScore');
  const scoreBoard = document.querySelector('.score-board');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const newRecordEl = document.getElementById('newRecord');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const diffBtns = document.querySelectorAll('.diff-btn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');

  // Game config
  let gridSize = 20;
  let tileCols = 20;
  let tileRows = 20;
  let speed = 100;
  let isFullscreen = false;

  // Game state
  let snake = [];
  let food = { x: 0, y: 0 };
  let dx = 1;
  let dy = 0;
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('snakeBestScore') || '0');
  let gameRunning = false;
  let gameLoop = null;
  let paused = false;

  bestScoreEl.textContent = bestScore;

  // ---------- Canvas resize ----------
  function resizeCanvas() {
    if (isFullscreen) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const targetTile = Math.floor(Math.min(w / 30, h / 15));
      gridSize = Math.max(16, Math.min(targetTile, 40));
      tileCols = Math.floor(w / gridSize);
      tileRows = Math.floor(h / gridSize);
      canvas.width = tileCols * gridSize;
      canvas.height = tileRows * gridSize;
    } else {
      const maxWidth = Math.min(400, window.innerWidth - 40);
      const size = Math.floor(maxWidth / 20) * 20;
      canvas.width = size;
      canvas.height = size;
      gridSize = size / 20;
      tileCols = 20;
      tileRows = 20;
    }
  }

  resizeCanvas();
  window.addEventListener('resize', function() {
    resizeCanvas();
    if (!gameRunning) draw();
  });

  // ---------- Game logic ----------
  function initSnake() {
    const startX = Math.floor(tileCols / 2);
    const startY = Math.floor(tileRows / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY }
    ];
    dx = 1;
    dy = 0;
    score = 0;
    scoreEl.textContent = score;
  }

  function generateFood() {
    let valid = false;
    while (!valid) {
      food.x = Math.floor(Math.random() * tileCols);
      food.y = Math.floor(Math.random() * tileRows);
      valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function changeDirection(newDx, newDy) {
    if (newDx === -dx && newDy === -dy) return;
    dx = newDx;
    dy = newDy;
  }

  function togglePause() {
    if (!gameRunning) return;
    paused = !paused;
    draw();
  }

  function update() {
    if (paused) return;

    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // Wall collision
    if (head.x < 0 || head.x >= tileCols || head.y < 0 || head.y >= tileRows) {
      gameOver();
      return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      generateFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0f1115';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= tileCols; i++) {
      ctx.beginPath();
      ctx.moveTo(i * gridSize, 0);
      ctx.lineTo(i * gridSize, canvas.height);
      ctx.stroke();
    }
    for (let i = 0; i <= tileRows; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * gridSize);
      ctx.lineTo(canvas.width, i * gridSize);
      ctx.stroke();
    }

    // Food
    const fx = food.x * gridSize;
    const fy = food.y * gridSize;
    const padding = 2;
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(fx + gridSize/2, fy + gridSize/2, gridSize/2 - padding, 0, Math.PI * 2);
    ctx.fill();

    // Snake
    snake.forEach((segment, index) => {
      const x = segment.x * gridSize;
      const y = segment.y * gridSize;
      if (index === 0) {
        // Head
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
        // Eyes
        ctx.fillStyle = '#0f1115';
        const eyeSize = gridSize / 6;
        const eyeOffset = gridSize / 4;
        if (dx === 1) { // right
          ctx.fillRect(x + gridSize - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(x + gridSize - eyeOffset - eyeSize, y + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
        } else if (dx === -1) { // left
          ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(x + eyeOffset, y + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
        } else if (dy === -1) { // up
          ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(x + gridSize - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
        } else { // down
          ctx.fillRect(x + eyeOffset, y + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
          ctx.fillRect(x + gridSize - eyeOffset - eyeSize, y + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
        }
      } else {
        // Body gradient
        const ratio = index / snake.length;
        const g = Math.floor(222 - ratio * 60);
        ctx.fillStyle = `rgb(74, ${g}, 128)`;
        ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
      }
    });

    // Pause overlay
    if (paused && gameRunning) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂停中', canvas.width/2, canvas.height/2);
      ctx.font = '14px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText('按空格继续', canvas.width/2, canvas.height/2 + 30);
    }
  }

  function tick() {
    update();
    draw();
  }

  // ---------- Game state ----------
  function startGame() {
    initSnake();
    generateFood();
    gameRunning = true;
    paused = false;
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);

    // Score board translucent during play
    if (isFullscreen) {
      scoreBoard.classList.remove('show-solid');
    }
  }

  function gameOver() {
    gameRunning = false;
    clearInterval(gameLoop);
    finalScoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      bestScoreEl.textContent = bestScore;
      localStorage.setItem('snakeBestScore', bestScore);
      newRecordEl.style.display = 'block';
    } else {
      newRecordEl.style.display = 'none';
    }
    gameOverOverlay.classList.remove('hidden');

    // Show score board clearly on game over
    if (isFullscreen) {
      scoreBoard.classList.add('show-solid');
    }
  }

  // ---------- Fullscreen ----------
  function toggleFullscreen() {
    const wasRunning = gameRunning;
    const oldCols = tileCols;
    const oldRows = tileRows;

    isFullscreen = !isFullscreen;

    if (isFullscreen) {
      document.body.classList.add('fullscreen-mode');
      fullscreenBtn.innerHTML = '✕';
      fullscreenBtn.title = '退出全屏';
      // Score state
      if (!gameOverOverlay.classList.contains('hidden')) {
        scoreBoard.classList.add('show-solid');
      }
    } else {
      document.body.classList.remove('fullscreen-mode');
      fullscreenBtn.innerHTML = '⛶';
      fullscreenBtn.title = '全屏';
      scoreBoard.classList.remove('show-solid');
    }

    setTimeout(function() {
      resizeCanvas();
      // Reposition snake & food proportionally
      if (wasRunning && snake.length > 0) {
        const ratioX = tileCols / oldCols;
        const ratioY = tileRows / oldRows;
        snake = snake.map(s => ({
          x: Math.min(Math.floor(s.x * ratioX), tileCols - 1),
          y: Math.min(Math.floor(s.y * ratioY), tileRows - 1)
        }));
        food.x = Math.min(Math.floor(food.x * ratioX), tileCols - 1);
        food.y = Math.min(Math.floor(food.y * ratioY), tileRows - 1);
      }
      draw();
    }, 50);
  }

  fullscreenBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleFullscreen();
  });

  // ---------- Keyboard controls ----------
  document.addEventListener('keydown', function(e) {
    if (!gameRunning && (e.key === ' ' || e.key === 'Enter')) {
      startGame();
      return;
    }
    if (!gameRunning) return;

    switch(e.key) {
      case 'ArrowUp':
      case 'w':
      case 'W':
        e.preventDefault();
        changeDirection(0, -1);
        break;
      case 'ArrowDown':
      case 's':
      case 'S':
        e.preventDefault();
        changeDirection(0, 1);
        break;
      case 'ArrowLeft':
      case 'a':
      case 'A':
        e.preventDefault();
        changeDirection(-1, 0);
        break;
      case 'ArrowRight':
      case 'd':
      case 'D':
        e.preventDefault();
        changeDirection(1, 0);
        break;
      case ' ':
        e.preventDefault();
        togglePause();
        break;
    }
  });

  // ---------- Mobile button controls ----------
  document.querySelectorAll('.ctrl-btn[data-dir]').forEach(btn => {
    const dirMap = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
    const dir = btn.getAttribute('data-dir');
    const [ndx, ndy] = dirMap[dir];

    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (gameRunning) changeDirection(ndx, ndy);
    });
    btn.addEventListener('click', function() {
      if (gameRunning) changeDirection(ndx, ndy);
    });
  });

  // ---------- Swipe controls (canvas + fullscreen) ----------
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;
  const minSwipeDistance = 30;

  function handleSwipeStart(x, y) {
    touchStartX = x;
    touchStartY = y;
    touchStartTime = Date.now();
  }

  function handleSwipeEnd(x, y) {
    if (!gameRunning || paused) return;
    const diffX = x - touchStartX;
    const diffY = y - touchStartY;
    const timeDiff = Date.now() - touchStartTime;
    if (timeDiff > 500) return;

    if (Math.abs(diffX) > Math.abs(diffY)) {
      if (Math.abs(diffX) > minSwipeDistance) {
        changeDirection(diffX > 0 ? 1 : -1, 0);
      }
    } else {
      if (Math.abs(diffY) > minSwipeDistance) {
        changeDirection(0, diffY > 0 ? 1 : -1);
      }
    }
  }

  // Canvas touch (non-fullscreen mode)
  canvas.addEventListener('touchstart', function(e) {
    if (isFullscreen) return;
    handleSwipeStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  canvas.addEventListener('touchend', function(e) {
    if (isFullscreen) return;
    handleSwipeEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }, { passive: true });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  // Fullscreen: whole screen swipe + right side tap to pause
  let fsTouchStartX = 0;
  let fsTouchStartY = 0;
  let fsTouchStartTime = 0;
  let fsTouchMoved = false;
  const fsMinSwipe = 20;
  const fsTapMaxDist = 10;
  const fsTapMaxTime = 300;

  document.addEventListener('touchstart', function(e) {
    if (!isFullscreen) return;
    if (e.target.closest('button') || e.target.closest('.overlay')) return;
    fsTouchStartX = e.touches[0].clientX;
    fsTouchStartY = e.touches[0].clientY;
    fsTouchStartTime = Date.now();
    fsTouchMoved = false;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isFullscreen) return;
    if (e.target.closest('button') || e.target.closest('.overlay')) return;
    const mx = e.touches[0].clientX - fsTouchStartX;
    const my = e.touches[0].clientY - fsTouchStartY;
    if (Math.abs(mx) > 5 || Math.abs(my) > 5) fsTouchMoved = true;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isFullscreen) return;
    if (e.target.closest('button') || e.target.closest('.overlay')) return;

    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const diffX = endX - fsTouchStartX;
    const diffY = endY - fsTouchStartY;
    const timeDiff = Date.now() - fsTouchStartTime;
    const isLeftSide = fsTouchStartX < window.innerWidth * 0.35;

    if (isLeftSide) {
      // Left side: swipe direction control
      if (!gameRunning || paused) return;
      if (timeDiff > 500) return;

      if (Math.abs(diffX) > Math.abs(diffY)) {
        if (Math.abs(diffX) > fsMinSwipe) {
          changeDirection(diffX > 0 ? 1 : -1, 0);
        }
      } else {
        if (Math.abs(diffY) > fsMinSwipe) {
          changeDirection(0, diffY > 0 ? 1 : -1);
        }
      }
    } else {
      // Right side: tap to pause/resume
      if (!gameRunning) return;
      const isTap = !fsTouchMoved &&
                    Math.abs(diffX) < fsTapMaxDist &&
                    Math.abs(diffY) < fsTapMaxDist &&
                    timeDiff < fsTapMaxTime;
      if (isTap) togglePause();
    }
  }, { passive: true });

  // Prevent scroll in fullscreen
  document.addEventListener('touchmove', function(e) {
    if (isFullscreen) e.preventDefault();
  }, { passive: false });

  // ---------- Difficulty buttons ----------
  diffBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      diffBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      speed = parseInt(this.getAttribute('data-speed'));
      if (gameRunning) {
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
    });
  });

  // ---------- Start/Restart ----------
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // Initial draw
  initSnake();
  generateFood();
  draw();

})();
</script>

</body>
</html>
